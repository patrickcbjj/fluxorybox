<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apps da Fluxory — Baixar</title>
  <meta name="description" content="Baixe os aplicativos Android da Fluxory: FluxoryBox, Casa Smart e mais." />
  <link rel="icon" href="/favicon-32.png" />
  <link rel="apple-touch-icon" href="/favicon-180.png" />
  <style>
    :root {
      --bg:#0d0f14; --surface:#14171e; --surface-2:#1b1f28; --line:#262b36;
      --text:#e7e9ef; --muted:#8b93a6; --muted-2:#6b7387; --accent:#6d7cff; --accent-2:#8b7bff;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Segoe UI",-apple-system,Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; line-height:1.5; }
    a { color:inherit; text-decoration:none; }
    .wrap { max-width:1120px; margin:0 auto; padding:0 24px; }
    .btn { display:inline-flex; align-items:center; gap:8px; border-radius:11px; padding:12px 20px;
      font-weight:600; font-size:14px; cursor:pointer; border:none; transition:filter .15s, transform .05s; }
    .btn:active { transform:translateY(1px); }
    .btn-primary { color:#fff; }
    .btn-primary:hover { filter:brightness(1.1); }
    .btn-ghost { background:var(--surface-2); color:var(--text); border:1px solid var(--line); }
    .btn-ghost:hover { background:#222735; }
    .btn svg { width:17px; height:17px; }

    .nav { position:sticky; top:0; z-index:20; backdrop-filter:blur(10px);
      background:rgba(13,15,20,.72); border-bottom:1px solid var(--line); }
    .nav-in { display:flex; align-items:center; justify-content:space-between; height:66px; }
    .brand { display:flex; align-items:center; gap:11px; font-weight:700; font-size:17px; letter-spacing:-.01em; }
    .brand img { width:34px; height:34px; border-radius:9px; }

    .head { position:relative; overflow:hidden; text-align:center; padding:64px 0 40px; }
    .head::before { content:""; position:absolute; width:900px; height:700px; left:50%; top:-460px;
      transform:translateX(-50%); background:radial-gradient(circle, rgba(109,124,255,.20), transparent 62%); }
    .eyebrow { display:inline-flex; align-items:center; gap:8px; font-size:12.5px; font-weight:600;
      color:var(--accent-2); background:rgba(109,124,255,.12); border:1px solid rgba(109,124,255,.25);
      padding:6px 12px; border-radius:999px; margin-bottom:20px; position:relative; }
    .eyebrow .dot { width:7px; height:7px; border-radius:50%; background:var(--accent); }
    h1 { font-size:44px; line-height:1.05; letter-spacing:-.03em; margin:0 0 14px; position:relative; }
    h1 .grad { background:linear-gradient(120deg,var(--accent),var(--accent-2)); -webkit-background-clip:text;
      background-clip:text; color:transparent; }
    .lead { font-size:16px; color:var(--muted); max-width:520px; margin:0 auto; position:relative; }

    .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; padding:12px 0 64px; }
    .app { background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:26px;
      display:flex; flex-direction:column; gap:16px; }
    .app-top { display:flex; align-items:center; gap:16px; }
    .app-ic { width:60px; height:60px; border-radius:16px; flex-shrink:0; display:grid; place-items:center;
      color:#fff; font-weight:800; font-size:22px; overflow:hidden; }
    .app-ic img { width:100%; height:100%; object-fit:cover; }
    .app-name { font-size:19px; font-weight:700; letter-spacing:-.01em; margin:0; }
    .app-tag { font-size:13px; color:var(--muted-2); margin:2px 0 0; }
    .app-desc { color:var(--muted); font-size:14px; margin:0; flex:1; }
    .app-foot { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .ver { font-size:11.5px; color:var(--accent-2); font-weight:600; border:1px solid rgba(109,124,255,.3);
      border-radius:999px; padding:3px 10px; display:inline-block; }
    .app-links { display:flex; gap:10px; align-items:center; }
    .site-link { color:var(--muted); font-size:13px; }
    .site-link:hover { color:var(--accent-2); }

    footer { border-top:1px solid var(--line); padding:28px 0; color:var(--muted-2); font-size:13px;
      display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
    .note { text-align:center; color:var(--muted-2); font-size:12.5px; margin:0 0 40px; }

    @media (max-width:720px){ .grid{ grid-template-columns:1fr; } h1{ font-size:34px; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="wrap nav-in">
      <a class="brand" href="/"><img src="/logo.png" alt="" /><span>Fluxory</span></a>
      <a class="btn btn-ghost" href="/">Início</a>
    </div>
  </nav>

  <header class="head">
    <div class="wrap">
      <span class="eyebrow"><span class="dot"></span>Central de aplicativos</span>
      <h1>Baixe os <span class="grad">apps da Fluxory</span></h1>
      <p class="lead">Todos os aplicativos Android num lugar só. Toque para baixar o APK e instalar direto no seu celular.</p>
    </div>
  </header>

  <main class="wrap">
    <div class="grid" id="grid"></div>
    <p class="note">Android 5.0+ · instale permitindo "fontes desconhecidas" quando o sistema pedir.</p>
  </main>

  <footer class="wrap">
    <span>© 2026 Fluxory</span>
    <a href="/">Voltar ao início →</a>
  </footer>

  <script>
    const dlIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 12l5 5 5-5"/><path d="M5 21h14"/></svg>';

    function initial(name){ return (name || '?').trim().charAt(0).toUpperCase(); }

    function card(a){
      const el = document.createElement('div');
      el.className = 'app';
      const accent = a.accent || '#6d7cff';
      const icon = a.icon
        ? `<div class="app-ic"><img src="${a.icon}" alt=""></div>`
        : `<div class="app-ic" style="background:linear-gradient(135deg,${accent},${accent}bb)">${initial(a.name)}</div>`;
      const site = a.site
        ? `<a class="site-link" href="${a.site}">Abrir site →</a>`
        : '';
      el.innerHTML = `
        <div class="app-top">
          ${icon}
          <div>
            <p class="app-name">${a.name}</p>
            <p class="app-tag">${a.tagline || ''}</p>
          </div>
        </div>
        <p class="app-desc">${a.description || ''}</p>
        <div class="app-foot">
          <span class="ver">v${a.version || '—'}</span>
          <div class="app-links">
            ${site}
            <a class="btn btn-primary" style="background:${accent}" href="${a.apk}" download>${dlIcon} Baixar APK</a>
          </div>
        </div>`;
      return el;
    }

    fetch('/apps.json?t=' + Date.now(), { cache: 'no-store' })
      .then(r => r.json())
      .then(d => {
        const grid = document.getElementById('grid');
        (d.apps || []).forEach(a => grid.appendChild(card(a)));
      })
      .catch(() => {
        document.getElementById('grid').innerHTML =
          '<p style="color:var(--muted)">Não foi possível carregar a lista de apps.</p>';
      });
  </script>
</body>
</html>
